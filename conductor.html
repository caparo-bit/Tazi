<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tazi · Conductores</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Inter', sans-serif; background: #0f1117; color: #e8e8f0; height: 100vh; overflow: hidden; }

    #login-screen {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100vh; padding: 1.5rem; background: #0f1117;
    }
    #login-screen h1 { font-size: 2rem; color: #3ecf8e; margin-bottom: 1rem; }
    #login-screen input {
      padding: 0.8rem 1rem; border-radius: 10px; border: 1px solid #2a2a45;
      background: rgba(255,255,255,0.05); color: white; width: 280px; font-size: 1rem; margin-bottom: 0.8rem;
    }
    #login-screen button {
      padding: 0.8rem; border-radius: 10px; background: #3ecf8e; color: #0f1117;
      font-weight: 700; border: none; cursor: pointer; width: 280px; font-size: 1rem;
    }
    #login-screen .error { color: #f87171; font-size: 0.9rem; margin-top: 0.5rem; }
    #login-screen .link { color: #3ecf8e; cursor: pointer; }

    #app-main { display: none; flex-direction: column; height: 100vh; background: #1a1a2e; }
    #map { height: 45vh; width: 100%; background: #0f1117; }
    #solicitudes-container { flex: 1; overflow-y: auto; padding: 0.8rem 1rem; }
    .solicitud-card {
      background: #2a2a45; border-radius: 14px; padding: 0.8rem 1rem; margin-bottom: 0.8rem;
      border: 1px solid #3a3a5a;
    }
    .solicitud-card .info { display: flex; flex-wrap: wrap; gap: 0.4rem 0.8rem; font-size: 0.9rem; }
    .solicitud-card .precio { color: #fbbc04; font-weight: 700; }
    .solicitud-card .distancia { color: #34a853; }
    .solicitud-card .btn-aceptar {
      background: #34a853; color: white; border: none; border-radius: 8px;
      padding: 0.3rem 1rem; font-weight: 600; cursor: pointer; margin-top: 0.4rem;
    }
    .solicitud-card .btn-aceptar:hover { background: #2d9248; }
    .empty-state { text-align: center; padding: 2rem; color: #6b7280; font-size: 0.95rem; }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }

    #btn-logout {
      position: fixed; top: 10px; right: 10px; z-index: 1000;
      background: rgba(255,255,255,0.1); border: 1px solid #2a2a45;
      color: #e8e8f0; padding: 0.3rem 0.8rem; border-radius: 20px; cursor: pointer;
    }
    .leaflet-popup-content-wrapper { border-radius: 12px; background: #1a1a2e; color: white; }
    .leaflet-popup-tip { background: #1a1a2e; }
    .leaflet-control-zoom a { color: white !important; background: #2a2a45 !important; }
  </style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <h1>🚖 Conductores</h1>
  <input id="login-email" type="email" placeholder="Email" />
  <input id="login-password" type="password" placeholder="Contraseña" />
  <button onclick="loginConductor()">Iniciar sesión</button>
  <div id="login-error" class="error"></div>
  <div style="margin-top:1rem; font-size:0.8rem; color:#6b7280;">
    ¿No eres conductor? <a href="/Tazi/" style="color:#3ecf8e;">Ir a app de usuarios</a>
  </div>
</div>

<!-- App principal -->
<div id="app-main">
  <div id="map"></div>
  <div id="solicitudes-container">
    <div class="empty-state">
      <div class="icon">🚗</div>
      No hay solicitudes pendientes
    </div>
  </div>
  <button id="btn-logout" onclick="logout()">✕ Salir</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════════
// CONFIGURACIÓN SUPABASE
// ═══════════════════════════════════════════════════════════════════
const SB_URL = 'https://ejbvfirfodfktekgpwkm.supabase.co';
const SB_KEY = 'sb_publishable_ZNwpPu1uqxZfKWOU6FDgbQ_0sLhGrXt';
const sb = supabase.createClient(SB_URL, SB_KEY);

let currentUser = null;
let map = null;
let myMarker = null;
let conductorPos = null;
let watchId = null;
let channel = null;
let solicitudMarkers = [];

// ── Login ──
async function loginConductor() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errorDiv = document.getElementById('login-error');
  errorDiv.textContent = '';

  if (!email || !password) {
    errorDiv.textContent = 'Completa todos los campos.';
    return;
  }

  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) throw error;

    const { data: perfil, error: perfilError } = await sb
      .from('perfiles')
      .select('rol')
      .eq('id', data.user.id)
      .single();

    if (perfilError || perfil.rol !== 'conductor') {
      await sb.auth.signOut();
      throw new Error('No tienes permisos de conductor.');
    }

    currentUser = data.user;
    iniciarApp();
  } catch (err) {
    errorDiv.textContent = '❌ ' + err.message;
  }
}

// ── Iniciar app ──
function iniciarApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-main').style.display = 'flex';
  initMap();
  startGPS();
  cargarSolicitudes();
  suscribirSolicitudes();
}

// ── Mapa ──
function initMap() {
  if (map) return;
  map = L.map('map').setView([40.4168, -3.7038], 13);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '© OSM, © CARTO',
    maxZoom: 19,
    subdomains: 'abcd'
  }).addTo(map);
}

// ── GPS ──
function startGPS() {
  if (!navigator.geolocation) return;
  watchId = navigator.geolocation.watchPosition(
    pos => {
      const { latitude, longitude } = pos.coords;
      conductorPos = { lat: latitude, lng: longitude };
      const ll = [latitude, longitude];
      if (!myMarker) {
        const icon = L.divIcon({
          html: '<div style="background:#4285f4;width:16px;height:16px;border-radius:50%;border:2px solid white;box-shadow:0 0 0 4px rgba(66,133,244,0.3);"></div>',
          iconSize: [16,16],
          iconAnchor: [8,8]
        });
        myMarker = L.marker(ll, { icon }).addTo(map);
      } else {
        myMarker.setLatLng(ll);
      }
      map.setView(ll, 14);
      cargarSolicitudes();
    },
    err => console.warn('GPS error', err),
    { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
  );
}

// ── Solicitudes ──
function distanciaKm(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.asin(Math.sqrt(a));
}

async function cargarSolicitudes() {
  if (!conductorPos) return;

  try {
    const { data, error } = await sb
      .from('solicitudes')
      .select('*')
      .eq('estado', 'pendiente')
      .is('conductor_id', null)
      .order('created_at', { ascending: false });

    if (error) throw error;
    renderizarSolicitudes(data || []);
  } catch (err) {
    console.error('Error cargando solicitudes:', err);
    document.getElementById('solicitudes-container').innerHTML =
      '<div class="empty-state"><div class="icon">⚠️</div>Error al cargar solicitudes</div>';
  }
}

function renderizarSolicitudes(lista) {
  const container = document.getElementById('solicitudes-container');
  if (!lista.length) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="icon">🚗</div>
        No hay solicitudes pendientes
      </div>
    `;
    return;
  }

  let html = '';
  lista.forEach(s => {
    const dist = distanciaKm(conductorPos.lat, conductorPos.lng, s.origen_lat, s.origen_lng);
    const tiempo = Math.round((dist / 30) * 60);
    html += `
      <div class="solicitud-card">
        <div class="info">
          <span><strong>${s.origen_nombre || 'Origen'}</strong> → ${s.destino_nombre || 'Destino'}</span>
          <span class="precio">💰 ${s.precio.toFixed(2)} €</span>
          <span class="distancia">📏 ${s.distancia_km.toFixed(1)} km</span>
        </div>
        <div style="font-size:0.8rem;color:#9aa0a6;">🚗 ${dist.toFixed(1)} km de ti · ⏱ ~${tiempo} min</div>
        <button class="btn-aceptar" onclick="aceptarSolicitud('${s.id}')">✅ Aceptar</button>
      </div>
    `;
  });
  container.innerHTML = html;

  // Marcadores en el mapa
  solicitudMarkers.forEach(m => map.removeLayer(m));
  solicitudMarkers = [];
  lista.forEach(s => {
    const marker = L.marker([s.origen_lat, s.origen_lng])
      .addTo(map)
      .bindPopup(`
        <b>${s.origen_nombre || 'Origen'}</b><br/>
        Destino: ${s.destino_nombre || 'Destino'}<br/>
        Precio: ${s.precio.toFixed(2)} €
      `);
    solicitudMarkers.push(marker);
  });
}

// ── Aceptar solicitud ──
async function aceptarSolicitud(id) {
  if (!currentUser) return;
  if (!confirm('¿Aceptar esta solicitud?')) return;

  try {
    const { error } = await sb
      .from('solicitudes')
      .update({
        estado: 'aceptado',
        conductor_id: currentUser.id,
        updated_at: new Date().toISOString()
      })
      .eq('id', id);

    if (error) throw error;
    toast('Solicitud aceptada 🎉');
    cargarSolicitudes();
  } catch (err) {
    alert('Error al aceptar: ' + err.message);
  }
}

// ── Suscripción en tiempo real ──
function suscribirSolicitudes() {
  if (channel) sb.removeChannel(channel);
  channel = sb.channel('solicitudes-pendientes');
  channel.on(
    'postgres_changes',
    {
      event: 'INSERT',
      schema: 'public',
      table: 'solicitudes',
      filter: 'estado=eq.pendiente'
    },
    () => cargarSolicitudes()
  ).subscribe();
}

// ── Toast ──
function toast(msg) {
  const t = document.createElement('div');
  t.style.cssText = `
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: #1a1a2e; border: 1px solid #2a2a45;
    border-radius: 40px; padding: 10px 24px;
    color: #34d399; font-weight: 500; z-index: 9999;
    box-shadow: 0 8px 24px rgba(0,0,0,0.6);
    transition: opacity 0.3s; opacity: 0;
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
  `;
  t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(() => t.style.opacity = '1');
  setTimeout(() => {
    t.style.opacity = '0';
    setTimeout(() => t.remove(), 500);
  }, 2500);
}

// ── Logout ──
function logout() {
  if (watchId) navigator.geolocation.clearWatch(watchId);
  if (channel) sb.removeChannel(channel);
  sb.auth.signOut();
  currentUser = null;
  document.getElementById('app-main').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-email').value = '';
  document.getElementById('login-password').value = '';
  document.getElementById('login-error').textContent = '';
}

// ── Auto-login si hay sesión ──
sb.auth.getSession().then(({ data: { session } }) => {
  if (session?.user) {
    sb.from('perfiles').select('rol').eq('id', session.user.id).single()
      .then(({ data }) => {
        if (data?.rol === 'conductor') {
          currentUser = session.user;
          iniciarApp();
        }
      });
  }
});
</script>
</body>
</html>
