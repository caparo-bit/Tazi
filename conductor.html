<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="application-name" content="Tazi Conductores" />
  <meta name="theme-color" content="#0f1117" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tazi Conductores" />
  <title>Tazi · Conductores</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Inter', sans-serif; background: #0f1117; color: #e8e8f0; height: 100vh; overflow: hidden; }
    #login-conductor { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 1rem; background: #0f1117; }
    #login-conductor h1 { font-size: 1.8rem; color: #3ecf8e; }
    #login-conductor input { padding: 0.8rem 1rem; border-radius: 10px; border: 1px solid #2a2a45; background: rgba(255,255,255,0.05); color: white; width: 280px; font-size: 1rem; }
    #login-conductor button { padding: 0.8rem 2rem; border-radius: 10px; background: #3ecf8e; color: #0f1117; font-weight: 700; border: none; cursor: pointer; width: 280px; font-size: 1rem; }
    #login-conductor .error { color: #f87171; font-size: 0.9rem; }
    #app-conductor { display: none; flex-direction: column; height: 100vh; }
    #map { height: 50vh; width: 100%; }
    #lista-solicitudes { flex: 1; overflow-y: auto; padding: 1rem; background: #1a1a2e; }
    .solicitud-item { background: #2a2a45; border-radius: 12px; padding: 0.8rem 1rem; margin-bottom: 0.6rem; border: 1px solid #3a3a5a; }
    .solicitud-item .info { display: flex; flex-wrap: wrap; gap: 0.5rem; font-size: 0.9rem; }
    .solicitud-item .precio { color: #fbbc04; font-weight: 700; }
    .solicitud-item .distancia { color: #34a853; }
    .solicitud-item button { background: #34a853; color: white; border: none; border-radius: 8px; padding: 0.4rem 1rem; cursor: pointer; font-weight: 600; margin-top: 0.4rem; }
    .solicitud-item button:hover { background: #2d9248; }
    #btn-logout { position: fixed; top: 10px; right: 10px; z-index: 1000; background: rgba(255,255,255,0.1); border: 1px solid #2a2a45; color: #e8e8f0; padding: 0.3rem 0.8rem; border-radius: 20px; cursor: pointer; }
    .leaflet-popup-content-wrapper { border-radius: 12px; background: #1a1a2e; color: white; }
    .leaflet-popup-tip { background: #1a1a2e; }
    .leaflet-control-zoom a { color: white !important; background: #2a2a45 !important; }
  </style>
</head>
<body>

  <!-- Pantalla de login -->
  <div id="login-conductor">
    <h1>🚖 Conductores</h1>
    <input id="email" type="email" placeholder="tu@email.com" />
    <input id="password" type="password" placeholder="Contraseña" />
    <button onclick="loginConductor()">Iniciar sesión</button>
    <div id="error-msg" class="error"></div>
  </div>

  <!-- App principal -->
  <div id="app-conductor">
    <div id="map"></div>
    <div id="lista-solicitudes">
      <div style="text-align:center; padding: 2rem; color: #6b7280;">Cargando solicitudes...</div>
    </div>
    <button id="btn-logout" onclick="logout()">✕ Salir</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // ═══════════════════════════════════════════
    // CONFIGURACIÓN SUPABASE (usa tus credenciales)
    // ═══════════════════════════════════════════
    const SB_URL = 'https://ejbvfirfodfktekgpwkm.supabase.co';
    const SB_KEY = 'sb_publishable_ZNwpPu1uqxZfKWOU6FDgbQ_0sLhGrXt';
    const sb = supabase.createClient(SB_URL, SB_KEY);

    let currentUser = null;
    let map, myMarker;
    let conductorPos = null;
    let channel = null;
    let watchId = null;

    // ═══════════════════════════════════════════
    // LOGIN
    // ═══════════════════════════════════════════
    async function loginConductor() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('error-msg');
      errorDiv.textContent = '';

      if (!email || !password) {
        errorDiv.textContent = 'Completa todos los campos';
        return;
      }

      try {
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;

        // Verificar rol
        const { data: perfil, error: perfilError } = await sb
          .from('perfiles')
          .select('rol')
          .eq('id', data.user.id)
          .single();

        if (perfilError || perfil.rol !== 'conductor') {
          await sb.auth.signOut();
          throw new Error('No tienes permisos de conductor');
        }

        currentUser = data.user;
        document.getElementById('login-conductor').style.display = 'none';
        document.getElementById('app-conductor').style.display = 'flex';
        iniciarMapa();
        iniciarGPS();
        cargarSolicitudes();
        suscribirSolicitudes();
      } catch (err) {
        errorDiv.textContent = err.message;
      }
    }

    function logout() {
      if (watchId) navigator.geolocation.clearWatch(watchId);
      if (channel) sb.removeChannel(channel);
      sb.auth.signOut();
      currentUser = null;
      document.getElementById('login-conductor').style.display = 'flex';
      document.getElementById('app-conductor').style.display = 'none';
    }

    // ═══════════════════════════════════════════
    // MAPA Y GPS
    // ═══════════════════════════════════════════
    function iniciarMapa() {
      if (map) return;
      map = L.map('map').setView([40.4168, -3.7038], 13);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '© OSM, © CARTO',
        maxZoom: 19,
        subdomains: 'abcd'
      }).addTo(map);
    }

    function iniciarGPS() {
      if (!navigator.geolocation) return;
      watchId = navigator.geolocation.watchPosition(
        pos => {
          const { latitude, longitude } = pos.coords;
          conductorPos = { lat: latitude, lng: longitude };
          const ll = [latitude, longitude];
          if (!myMarker) {
            const icon = L.divIcon({ html: '<div style="background:#4285f4;width:16px;height:16px;border-radius:50%;border:2px solid white;box-shadow:0 0 0 4px rgba(66,133,244,0.3);"></div>', iconSize: [16,16], iconAnchor: [8,8] });
            myMarker = L.marker(ll, { icon }).addTo(map);
          } else {
            myMarker.setLatLng(ll);
          }
          map.setView(ll, 14);
          cargarSolicitudes();
        },
        err => console.warn('GPS error', err),
        { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
      );
    }

    // ═══════════════════════════════════════════
    // SOLICITUDES
    // ═══════════════════════════════════════════
    function distanciaKm(lat1, lng1, lat2, lng2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
      return R * 2 * Math.asin(Math.sqrt(a));
    }

    function cargarSolicitudes() {
      if (!conductorPos) return;
      sb.from('solicitudes')
        .select('*')
        .eq('estado', 'pendiente')
        .is('conductor_id', null)
        .order('created_at', { ascending: false })
        .then(({ data, error }) => {
          if (error) throw error;
          renderizarSolicitudes(data);
        })
        .catch(err => console.warn('Error cargando solicitudes:', err));
    }

    function renderizarSolicitudes(lista) {
      const container = document.getElementById('lista-solicitudes');
      if (!lista.length) {
        container.innerHTML = '<div style="text-align:center;padding:2rem;color:#6b7280;">No hay solicitudes pendientes</div>';
        return;
      }

      container.innerHTML = lista.map(s => {
        const dist = distanciaKm(conductorPos.lat, conductorPos.lng, s.origen_lat, s.origen_lng);
        const tiempo = Math.round((dist / 30) * 60); // 30 km/h
        return `
          <div class="solicitud-item" data-id="${s.id}">
            <div class="info">
              <span><strong>${s.origen_nombre || 'Origen'}</strong> → ${s.destino_nombre || 'Destino'}</span>
              <span class="precio">💰 ${s.precio} €</span>
              <span class="distancia">📏 ${s.distancia_km} km</span>
            </div>
            <div style="font-size:0.8rem;color:#9aa0a6;">🚗 ${dist.toFixed(1)} km de ti · ⏱ ~${tiempo} min</div>
            <button onclick="aceptarSolicitud('${s.id}')">✅ Aceptar</button>
          </div>
        `;
      }).join('');
    }

    function aceptarSolicitud(id) {
      if (!currentUser) return;
      if (!confirm('¿Aceptar esta solicitud?')) return;

      sb.from('solicitudes')
        .update({ estado: 'aceptado', conductor_id: currentUser.id })
        .eq('id', id)
        .then(({ error }) => {
          if (error) {
            alert('Error al aceptar: ' + error.message);
          } else {
            toast('Solicitud aceptada 🎉');
            cargarSolicitudes();
          }
        });
    }

    // ═══════════════════════════════════════════
    // SUSCRIPCIÓN EN TIEMPO REAL
    // ═══════════════════════════════════════════
    function suscribirSolicitudes() {
      if (channel) sb.removeChannel(channel);
      channel = sb.channel('solicitudes-pendientes');
      channel.on(
        'postgres_changes',
        {
          event: 'INSERT',
          schema: 'public',
          table: 'solicitudes',
          filter: 'estado=eq.pendiente'
        },
        () => cargarSolicitudes()
      ).subscribe();
    }

    // ═══════════════════════════════════════════
    // TOAST
    // ═══════════════════════════════════════════
    function toast(msg) {
      const t = document.createElement('div');
      t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid #2a2a45;border-radius:40px;padding:10px 24px;color:#34d399;font-weight:500;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,0.6);transition:opacity 0.3s;opacity:0;';
      t.textContent = msg;
      document.body.appendChild(t);
      requestAnimationFrame(() => t.style.opacity = '1');
      setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 500); }, 2500);
    }

    // ═══════════════════════════════════════════
    // INICIO
    // ═══════════════════════════════════════════
    // Si ya hay sesión activa (por ejemplo, después de un refresh)
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session?.user) {
        // Verificar rol y redirigir automáticamente
        sb.from('perfiles').select('rol').eq('id', session.user.id).single()
          .then(({ data }) => {
            if (data?.rol === 'conductor') {
              currentUser = session.user;
              document.getElementById('login-conductor').style.display = 'none';
              document.getElementById('app-conductor').style.display = 'flex';
              iniciarMapa();
              iniciarGPS();
              cargarSolicitudes();
              suscribirSolicitudes();
            }
          });
      }
    });
  </script>
</body>
</html>
