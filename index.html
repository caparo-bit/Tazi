<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tazi · Madrid</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    /* ... (estilos idénticos a la versión anterior) ... */

</head>
<body>

  <!-- ... (HTML idéntico al anterior) ... -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
  </script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
  </script>
  <script>
    // ══════════════════════════════════════════════════════════════
    //  CONFIGURACIÓN SUPABASE
    // ══════════════════════════════════════════════════════════════
    const SB_URL = 'https://ejbvfirfodfktekgpwkm.supabase.co';
    const SB_KEY = 'sb_publishable_ZNwpPu1uqxZfKWOU6FDgbQ_0sLhGrXt';
    const { createClient } = supabase;
    const sb = createClient(SB_URL, SB_KEY);

    // ══════════════════════════════════════════════════════════════
    //  TARIFAS TAXI MADRID 2026 (OFICIAL)
    // ══════════════════════════════════════════════════════════════
    const TARIFAS = {
      t1: { id: 'T1', nombre: 'Laborable diurno', horario: 'Lun–Vie 7:00–21:00 h', tipo: 'metro', bandera: 2.55, km: 1.40,
        hora: 27.00, min: 4.50 },
      t2: { id: 'T2', nombre: 'Nocturno y festivos', horario: 'Diario 21:00–7:00 h · Sáb/Dom/Fest 7:00–21:00 h',
        tipo: 'metro', bandera: 3.20, km: 1.60, hora: 29.00, min: 5.50 },
      t4: { id: 'T4', nombre: 'Aeropuerto → dentro M-30', horario: '24h · 365 días · Sin suplementos', tipo: 'fijo',
        precio_fijo: 33.00, nota: 'Tarifa fija entre cualquier terminal (T1–T4) y cualquier punto dentro de la M-30. Sin recargo por equipaje, nº de pasajeros ni horario.' },
      t3: { id: 'T3', nombre: 'Aeropuerto → fuera M-30', horario: '24h · 365 días', tipo: 'minimo_luego_metro',
        minimo: 22.00, franquicia_km: 9.0, km_t1: 1.40, km_t2: 1.60,
        nota: 'Mínimo 22 € cubre los primeros 9 km. Superados, el taxímetro sigue en T1 (día) o T2 (noche/fest).' },
      t7: { id: 'T7', nombre: 'Estaciones y IFEMA', horario: '24h · 365 días', tipo: 'salida_especial', salida: 8.00,
        franquicia_m: 1450, km: 1.40, km_noche: 1.60,
        nota: 'Salida desde: Atocha · Chamartín · Av. América · Méndez Álvaro · IFEMA.\n8 € incluye los primeros 1.450 m. Luego T1 (día) o T2 (noche/fest).' }
    };

    // ══════════════════════════════════════════════════════════════
    //  ESTADO GLOBAL
    // ══════════════════════════════════════════════════════════════
    let map, myMarker, accCircle, destMarker, routeLayer;
    let myPos = null,
      destPos = null,
      routeKm = null,
      routeDurMin = null;
    let watchId = null,
      currentUser = null,
      lastSaved = 0;
    let tarifaKey = 't1',
      fullscreen = false;
    const SAVE_MS = 10000;

    let fetchingRoute = false;
    let routeFetchTimeout = null;
    let lastRouteKm = null;
    let isFlying = false; // para evitar múltiples animaciones

    // ══════════════════════════════════════════════════════════════
    //  AUTH UI (las mismas funciones, sin cambios)
    // ══════════════════════════════════════════════════════════════
    function showMsg(t, tp = 'error') { /* ... */ }

    function clearMsg() { /* ... */ }

    function sw(n) { /* ... */ }

    function ld(id, on, lbl) { /* ... */ }

    async function doLogin() { /* ... */ }

    async function doRegister() { /* ... */ }

    async function doMagic() { /* ... */ }

    async function doLogout() { stopGPS();
      await sb.auth.signOut(); }

    // ══════════════════════════════════════════════════════════════
    //  SESIÓN
    // ══════════════════════════════════════════════════════════════
    (async () => {
      const { data: { session } } = await sb.auth.getSession();
      if (session?.user) onLogin(session.user);
    })();
    sb.auth.onAuthStateChange((_, s) => {
      if (s?.user) onLogin(s.user);
      else onLogout();
    });

    function onLogin(u) {
      currentUser = u;
      document.getElementById('screen-auth').style.display = 'none';
      document.getElementById('screen-map').classList.add('active');
      initMap();
      startGPS();
    }

    function onLogout() {
      currentUser = null;
      document.getElementById('screen-map').classList.remove('active');
      document.getElementById('screen-auth').style.display = '';
      if (map) { map.remove();
        map = null;
        myMarker = null;
        accCircle = null;
        destMarker = null;
        routeLayer = null; }
    }

    // ══════════════════════════════════════════════════════════════
    //  MAPA
    // ══════════════════════════════════════════════════════════════
    function initMap() {
      if (map) return;
      map = L.map('map', { center: [40.4168, -3.7038], zoom: 13, zoomControl: true });
      L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '© <a href="https://openstreetmap.org">OSM</a> © <a href="https://carto.com">CARTO</a>',
        maxZoom: 19,
        subdomains: 'abcd'
      }).addTo(map);
      map.on('click', () => document.getElementById('ac-list').style.display = 'none');
    }

    function centerMap() { if (map && myPos) map.setView([myPos.lat, myPos.lng], 16, { animate: true }); }

    function toggleFull() {
      fullscreen = !fullscreen;
      document.getElementById('map-wrap').classList.toggle('fullscreen', fullscreen);
      document.getElementById('btn-expand').textContent = fullscreen ? '✕' : '⛶';
      setTimeout(() => map && map.invalidateSize(), 250);
    }

    // ══════════════════════════════════════════════════════════════
    //  GPS
    // ══════════════════════════════════════════════════════════════
    function startGPS() {
      if (!navigator.geolocation) { setSt('GPS no disponible', false); return; }
      setSt('Conectando GPS…', false);
      watchId = navigator.geolocation.watchPosition(onPos, onGPSErr, { enableHighAccuracy: true, maximumAge: 5000,
        timeout: 15000 });
    }

    function stopGPS() { if (watchId != null) { navigator.geolocation.clearWatch(watchId);
        watchId = null } }

    function onPos(pos) {
      const { latitude: lat, longitude: lng, accuracy: acc } = pos.coords;
      myPos = { lat, lng };
      setSt('GPS activo · ±' + Math.round(acc) + ' m', true);
      const cm = document.getElementById('coords-mini');
      cm.style.display = 'block';
      cm.textContent = '📍 ' + lat.toFixed(6) + ', ' + lng.toFixed(6);
      const ll = [lat, lng];
      const icon = L.divIcon({ className: '', html: '<div class="my-dot"></div>', iconSize: [16, 16], iconAnchor: [8, 8] });
      if (!myMarker) {
        myMarker = L.marker(ll, { icon, zIndexOffset: 1000 }).addTo(map).bindPopup('<b>Tu ubicación</b>', { closeButton: false });
        accCircle = L.circle(ll, { radius: acc, color: '#4285f4', fillColor: '#4285f4', fillOpacity: .08, weight: 1 })
          .addTo(map);
        map.setView(ll, 15);
      } else { myMarker.setLatLng(ll);
        accCircle.setLatLng(ll);
        accCircle.setRadius(acc); }
      if (destPos) scheduleFetchRoute();
      const now = Date.now();
      if (now - lastSaved >= SAVE_MS) { saveLocation(lat, lng, acc);
        lastSaved = now; }
    }

    function onGPSErr(e) { const m = { 1: 'Permiso GPS denegado', 2: 'Ubicación no disponible', 3: 'Tiempo agotado' };
      setSt(m[e.code] || 'Error GPS', false); }

    function setSt(t, on) { document.getElementById('stext').textContent = t;
      document.getElementById('sdot').className = 'sdot' + (on ? ' on' : ''); }

    // ══════════════════════════════════════════════════════════════
    //  BÚSQUEDA (idéntica)
    // ══════════════════════════════════════════════════════════════
    let acTimer = null;

    function onSI() { /* ... */ }

    async function fetchAC(q) { /* ... */ }

    function showAC(res) { /* ... */ }

    async function doSearch() { /* ... */ }

    function pickAC(lat, lon, name) { /* ... */ }

    function clearDest() {
      document.getElementById('dest-input').value = '';
      document.getElementById('btn-clear').style.display = 'none';
      document.getElementById('ac-list').style.display = 'none';
      destPos = null;
      routeKm = null;
      routeDurMin = null;
      lastRouteKm = null;
      if (routeLayer) { map.removeLayer(routeLayer);
        routeLayer = null; }
      if (destMarker) { map.removeLayer(destMarker);
        destMarker = null; }
      document.getElementById('no-dest').style.display = '';
      document.getElementById('route-card').style.display = 'none';
      document.getElementById('tarifa-section').style.display = 'none';
      document.getElementById('route-loading').style.display = 'none';
      document.getElementById('price-card').style.display = 'none';
      if (routeFetchTimeout) { clearTimeout(routeFetchTimeout);
        routeFetchTimeout = null; }
      fetchingRoute = false;
      isFlying = false;
    }

    // ══════════════════════════════════════════════════════════════
    //  DESTINO
    // ══════════════════════════════════════════════════════════════
    function setDest(lat, lng, name) {
      destPos = { lat, lng };
      const pin =
        `<svg width="26" height="36" viewBox="0 0 26 36" fill="none"><path d="M13 0C5.82 0 0 5.82 0 13c0 9.1 13 23 13 23S26 22.1 26 13C26 5.82 20.18 0 13 0z" fill="#ea4335"/><circle cx="13" cy="13" r="5.5" fill="white"/></svg>`;
      const icon = L.divIcon({ className: '', html: pin, iconSize: [26, 36], iconAnchor: [13, 36] });
      if (destMarker) {
        destMarker.setLatLng([lat, lng]);
      } else {
        destMarker = L.marker([lat, lng], { icon }).addTo(map);
      }
      destMarker.bindPopup(`<b>${name}</b>`).openPopup();
      if (!myPos) {
        map.setView([lat, lng], 14);
      }
      scheduleFetchRoute();
    }

    // ══════════════════════════════════════════════════════════════
    //  RUTA OSRM (CON DEBOUNCE Y CONTROL DE ANIMACIÓN)
    // ══════════════════════════════════════════════════════════════
    function scheduleFetchRoute() {
      if (routeFetchTimeout) clearTimeout(routeFetchTimeout);
      routeFetchTimeout = setTimeout(() => {
        routeFetchTimeout = null;
        fetchRoute();
      }, 300);
    }

    async function fetchRoute() {
      if (!myPos || !destPos) return;
      if (fetchingRoute) return;
      fetchingRoute = true;

      document.getElementById('no-dest').style.display = 'none';
      document.getElementById('route-card').style.display = 'none';
      document.getElementById('tarifa-section').style.display = 'none';
      document.getElementById('price-card').style.display = 'none';
      document.getElementById('route-loading').style.display = 'block';

      try {
        const url =
          `https://router.project-osrm.org/route/v1/driving/${myPos.lng},${myPos.lat};${destPos.lng},${destPos.lat}?overview=full&geometries=geojson`;
        const d = await (await fetch(url)).json();
        if (d.code !== 'Ok' || !d.routes?.length) throw new Error('Sin ruta');
        const route = d.routes[0];
        const newKm = route.distance / 1000;
        // Si la distancia cambia menos de 50m, solo actualizamos tiempo y precio
        if (lastRouteKm !== null && Math.abs(newKm - lastRouteKm) < 0.05) {
          routeDurMin = Math.round(route.duration / 60);
          document.getElementById('route-time').textContent = '~' + routeDurMin + ' min';
          calcPrice();
          fetchingRoute = false;
          document.getElementById('route-loading').style.display = 'none';
          return;
        }
        lastRouteKm = newKm;
        routeKm = newKm;
        routeDurMin = Math.round(route.duration / 60);

        const coords = route.geometry.coordinates.map(c => [c[1], c[0]]);

        if (routeLayer) {
          routeLayer.setLatLngs(coords);
        } else {
          routeLayer = L.polyline(coords, {
            color: '#1a73e8',
            weight: 5,
            opacity: 0.8
          }).addTo(map);
        }

        // Ajustar vista solo si es necesario y no hay animación en curso
        const bounds = routeLayer.getBounds();
        const mapBounds = map.getBounds();
        // Si la ruta no está completamente visible o el zoom es menor a 13, ajustamos
        if (!mapBounds.contains(bounds) || map.getZoom() < 13) {
          if (!isFlying) {
            isFlying = true;
            map.flyToBounds(bounds, {
              padding: [60, 60],
              duration: 0.8,
              easeLinearity: 0.25
            });
            // Liberar el flag después de la animación
            setTimeout(() => { isFlying = false; }, 1000);
          }
        }

        document.getElementById('route-loading').style.display = 'none';
        document.getElementById('route-card').style.display = 'block';
        document.getElementById('tarifa-section').style.display = 'block';
        document.getElementById('route-km').textContent = routeKm.toFixed(1) + ' km por carretera';
        document.getElementById('route-time').textContent = '~' + routeDurMin + ' min';
        calcPrice();
      } catch (e) {
        console.warn('OSRM:', e);
        document.getElementById('route-loading').style.display = 'none';
        document.getElementById('route-card').style.display = 'block';
        document.getElementById('route-km').textContent = 'Ruta no disponible';
        document.getElementById('route-time').textContent = '—';
      } finally {
        fetchingRoute = false;
      }
    }

    // ══════════════════════════════════════════════════════════════
    //  CÁLCULO DE PRECIO (TARIFAS CORREGIDAS CON DÍA/NOCHE)
    // ══════════════════════════════════════════════════════════════
    function esHorarioDiurno() {
      const ahora = new Date();
      const dia = ahora.getDay();
      const hora = ahora.getHours();
      const minutos = ahora.getMinutes();
      const horaMin = hora + minutos / 60;
      const esFinDeSemana = (dia === 0 || dia === 6);
      return !esFinDeSemana && (horaMin >= 7 && horaMin < 21);
    }

    function setTarifa(key, el) {
      tarifaKey = key;
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      if (routeKm != null) calcPrice();
    }

    function fmt(n) { return n.toFixed(2) + ' €'; }

    function calcPrice() {
      if (routeKm == null) return;
      const t = TARIFAS[tarifaKey];
      const pc = document.getElementById('price-card');
      pc.style.display = 'block';

      if (t.tipo === 'fijo') {
        pc.innerHTML = `
          <div class="price-fixed">
            <div class="pf-label">Precio fijo · Sin suplementos</div>
            <div class="pf-main">${fmt(t.precio_fijo)}</div>
            <div class="pf-desc">${t.nota}</div>
            <div class="pf-badge">${t.id} · ${t.horario}</div>
          </div>
          <p class="info-note">Tarifa fija oficial. No aplica recargo por equipaje, nº de pasajeros, noche ni festivo.</p>`;
        return;
      }

      if (t.tipo === 'minimo_luego_metro') {
        const esDiurno = esHorarioDiurno();
        const kmTarifa = esDiurno ? t.km_t1 : t.km_t2;
        const nombreTarifa = esDiurno ? 'T1 (diurna)' : 'T2 (nocturna/festivo)';
        let precio, desglose;
        if (routeKm <= t.franquicia_km) {
          precio = t.minimo;
          desglose = `Los ${routeKm.toFixed(1)} km están dentro de la franquicia de ${t.franquicia_km} km → se aplica el mínimo de 22,00 €.`;
        } else {
          const kmExtra = routeKm - t.franquicia_km;
          const extra = kmExtra * kmTarifa;
          precio = t.minimo + extra;
          desglose =
            `22,00 € (primeros ${t.franquicia_km} km) + ${fmt(extra)} (${kmExtra.toFixed(1)} km extra a ${fmt(kmTarifa)}/km en ${nombreTarifa})`;
        }
        pc.innerHTML = `
          <div class="price-meter">
            <div class="pm-left"><div class="pm-label">Precio estimado</div><div class="pm-main">${fmt(precio)}</div></div>
            <div class="pm-right"><div class="pm-tag">T3</div></div>
          </div>
          <div class="tarifa-explain">
            <div class="te-title">📋 Cómo se calcula T3</div>
            <div class="te-row"><span>Mínimo (primeros ${t.franquicia_km} km)</span><span class="te-val">22,00 €</span></div>
            ${routeKm > t.franquicia_km ? `<div class="te-row"><span>Km extra (${(routeKm - t.franquicia_km).toFixed(1)} km × ${kmTarifa.toFixed(2)} €/km)</span><span class="te-val">${fmt((routeKm - t.franquicia_km) * kmTarifa)}</span></div>` : ''}
            <div class="te-row"><span>Total estimado</span><span class="te-val">${fmt(precio)}</span></div>
          </div>
          <p class="info-note">${desglose}<br/>El exceso se calcula con ${nombreTarifa} según la hora actual.</p>`;
        return;
      }

      if (t.tipo === 'salida_especial') {
        const esDiurno = esHorarioDiurno();
        const kmTarifa = esDiurno ? t.km : t.km_noche;
        const nombreTarifa = esDiurno ? 'T1 (diurna)' : 'T2 (nocturna/festivo)';
        const franquicia_km = t.franquicia_m / 1000;
        let precio;
        if (routeKm <= franquicia_km) {
          precio = t.salida;
        } else {
          const kmExtra = routeKm - franquicia_km;
          precio = t.salida + (kmExtra * kmTarifa);
        }
        const kmExtra = Math.max(0, routeKm - franquicia_km);
        pc.innerHTML = `
          <div class="price-meter">
            <div class="pm-left"><div class="pm-label">Precio estimado</div><div class="pm-main">${fmt(precio)}</div></div>
            <div class="pm-right"><div class="pm-tag">T7</div></div>
          </div>
          <div class="tarifa-explain">
            <div class="te-title">🚉 Cómo se calcula T7</div>
            <div class="te-row"><span>Salida (incluye primeros ${franquicia_km.toFixed(2)} km)</span><span class="te-val">8,00 €</span></div>
            ${kmExtra > 0 ? `<div class="te-row"><span>Km extra (${kmExtra.toFixed(2)} km × ${kmTarifa.toFixed(2)} €/km)</span><span class="te-val">${fmt(kmExtra * kmTarifa)}</span></div>` : '<div class="te-row"><span>Dentro de la franquicia</span><span class="te-val">0,00 €</span></div>'}
            <div class="te-row"><span>Total estimado</span><span class="te-val">${fmt(precio)}</span></div>
          </div>
          <p class="info-note">Salida desde: Atocha · Chamartín · Av. América · Méndez Álvaro · IFEMA.<br/>El exceso se calcula con ${nombreTarifa} según la hora actual.</p>`;
        return;
      }

      // T1 / T2
      let precio = t.bandera + (routeKm * t.km);
      precio = Math.max(precio, t.min);
      pc.innerHTML = `
        <div class="price-meter">
          <div class="pm-left"><div class="pm-label">Precio estimado</div><div class="pm-main">${fmt(precio)}</div></div>
          <div class="pm-right"><div class="pm-tag">${t.id}</div></div>
        </div>
        <div class="price-grid">
          <div class="pg-item"><div class="pg-val">${fmt(t.bandera)}</div><div class="pg-key">Bajada de bandera</div></div>
          <div class="pg-item"><div class="pg-val">${t.km.toFixed(2)} €</div><div class="pg-key">Por km</div></div>
          <div class="pg-item"><div class="pg-val">${fmt(t.min)}</div><div class="pg-key">Mínimo</div></div>
        </div>
        <div class="tarifa-explain">
          <div class="te-title">📋 ${t.id} · ${t.nombre}</div>
          <div class="te-row"><span>${t.horario}</span></div>
          <div class="te-row"><span>Bandera + ${routeKm.toFixed(1)} km × ${t.km.toFixed(2)} €/km</span><span class="te-val">${fmt(precio)}</span></div>
        </div>
        <p class="info-note">Tarifas oficiales Ayuntamiento de Madrid 2026.<br/>Suplementos no incluidos: recogida app (máx. 5 €), maletas (0,85 €/bulto), Nochebuena/Nochevieja (7 €).</p>`;
    }

    // ══════════════════════════════════════════════════════════════
    //  GUARDAR SUPABASE
    // ══════════════════════════════════════════════════════════════
    async function saveLocation(lat, lng, acc) {
      if (!currentUser) return;
      try {
        await sb.from('locations').insert({ user_id: currentUser.id, latitude: lat, longitude: lng, accuracy: acc,
          recorded_at: new Date().toISOString() });
      } catch (e) { console.warn('save:', e.message) }
    }

    document.addEventListener('click', e => {
      if (!e.target.closest('#search-bar')) document.getElementById('ac-list').style.display = 'none';
    });
  </script>
</body>
