<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Taxi Madrid · Red</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f1117;
  color:white;
  overflow:hidden;
}

#topbar{
  height:52px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 12px;
  background:#12141d;
  border-bottom:1px solid #2a2a45;
}

#map{height:60vh;}

#panel{
  height:40vh;
  background:#161926;
  padding:12px;
}

input,select{
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
  border-radius:8px;
  background:#0f1117;
  color:white;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#3ecf8e;
  font-weight:bold;
}

.badge{
  display:inline-block;
  padding:4px 8px;
  border-radius:6px;
  font-size:.75rem;
  margin-bottom:6px;
}

.driver{ background:#3ecf8e;color:black; }
.client{ background:#3b82f6;color:white; }

.user-item{
  background:#1a1a2e;
  padding:6px;
  margin-top:5px;
  border-radius:8px;
  font-size:.85rem;
}
</style>
</head>

<body>

<div id="topbar">
  <strong>🚕 Red Taxi Madrid</strong>
  <button onclick="logout()">Salir</button>
</div>

<div id="map"></div>

<div id="panel">

  <div id="roleBox"></div>

  <select id="roleSelect">
    <option value="client">Cliente</option>
    <option value="driver">Conductor</option>
  </select>

  <button onclick="setRole()">Entrar con rol</button>

  <input id="dest" placeholder="Destino (solo cliente)"/>

  <button onclick="createTrip()">Solicitar viaje</button>

  <h4>Usuarios en vivo</h4>
  <div id="users"></div>

</div>

<script>

/* ========= SUPABASE ========= */
const sb = supabase.createClient(
  "https://ejbvfirfodfktekgpwkm.supabase.co",
  "TU_ANON_KEY"
);

let user, role;

/* ========= LOGIN ANON ========= */
async function init(){

  const {data} = await sb.auth.signInAnonymously();
  user = data.user;

  listenUsers();
}

init();

/* ========= ROLE ========= */
async function setRole(){

  role = roleSelect.value;

  await sb.from("profiles").upsert({
    id:user.id,
    role
  });

  roleBox.innerHTML =
    `<span class="badge ${role}">
      Rol: ${role}
    </span>`;
}

/* ========= MAPA ========= */
const map = L.map("map").setView([40.4168,-3.7038],13);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png")
.addTo(map);

let markers = {};

/* ========= GPS ========= */
navigator.geolocation.watchPosition(async pos=>{

  const lat = pos.coords.latitude;
  const lng = pos.coords.longitude;

  await sb.from("locations").upsert({
    user_id:user.id,
    role,
    lat,
    lng,
    updated_at:new Date()
  });

});

/* ========= ESCUCHAR USUARIOS ========= */
function listenUsers(){

  sb.channel("live")
  .on("postgres_changes",
    {event:"*",schema:"public",table:"locations"},
    payload=>renderUsers(payload.new)
  )
  .subscribe();

  loadAll();
}

async function loadAll(){

  const {data} = await sb.from("locations").select("*");

  data.forEach(renderUsers);
}

/* ========= DIBUJAR EN MAPA ========= */
function renderUsers(u){

  if(!u || !u.lat) return;

  const icon =
    u.role === "driver"
    ? "🚖"
    : "📍";

  const latlng = [u.lat,u.lng];

  if(markers[u.user_id]){
    markers[u.user_id].setLatLng(latlng);
  }else{
    markers[u.user_id] = L.marker(latlng)
      .addTo(map)
      .bindPopup(icon+" "+u.role);
  }

  renderList();
}

/* ========= LISTA ========= */
async function renderList(){

  const {data} = await sb.from("locations").select("*");

  users.innerHTML = data.map(u=>`
    <div class="user-item">
      ${u.role === "driver" ? "🚖 Conductor" : "📍 Cliente"}<br>
      ${u.lat.toFixed(4)}, ${u.lng.toFixed(4)}
    </div>
  `).join("");
}

/* ========= VIAJES ========= */
async function createTrip(){

  if(role !== "client")
    return alert("Solo clientes");

  const dest = document.getElementById("dest").value;

  await sb.from("trips").insert({
    client_id:user.id,
    destination:dest,
    status:"pending"
  });

  alert("Viaje solicitado");
}

/* ========= LOGOUT ========= */
function logout(){
  location.reload();
}

</script>

</body>
</html>
