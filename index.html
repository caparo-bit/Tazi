<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ride System Pro</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:system-ui;background:#0f1117;color:white;}
#map{height:55vh;}
#panel{height:45vh;background:#161926;padding:10px;overflow:auto;}

input,select,button{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:none;
}

button{background:#3ecf8e;font-weight:bold;cursor:pointer;}

.card{
  background:#1a1a2e;
  padding:8px;
  margin:5px 0;
  border-radius:8px;
}
.badge{
  padding:3px 6px;
  border-radius:6px;
  font-size:.75rem;
}
.pending{background:#f59e0b;color:black;}
.accepted{background:#3b82f6;}
.done{background:#10b981;}
</style>
</head>

<body>

<div id="map"></div>

<div id="panel">

<select id="role">
  <option value="client">Cliente</option>
  <option value="driver">Conductor</option>
</select>

<button onclick="setRole()">Entrar</button>

<input id="dest" placeholder="Destino"/>

<button onclick="createTrip()">Solicitar viaje</button>

<h4>Viajes</h4>
<div id="trips"></div>

</div>

<script>

const sb = supabase.createClient(
  "https://ejbvfirfodfktekgpwkm.supabase.co",
  "TU_ANON_KEY"
);

let user, role;

/* ================= MAPA ================= */
const map = L.map("map").setView([40.4168,-3.7038],13);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png")
.addTo(map);

/* ================= LOGIN ANON ================= */
(async()=>{
  const {data} = await sb.auth.signInAnonymously();
  user = data.user;
  listenTrips();
  listenDrivers();
})();

/* ================= ROLE ================= */
async function setRole(){
  role = role.value;

  await sb.from("profiles").upsert({
    id:user.id,
    role
  });

  if(role === "driver") startDriverGPS();
}

/* ================= GPS DRIVER ================= */
function startDriverGPS(){

  navigator.geolocation.watchPosition(async pos=>{

    await sb.from("locations").upsert({
      user_id:user.id,
      role:"driver",
      lat:pos.coords.latitude,
      lng:pos.coords.longitude,
      updated_at:new Date()
    });

  });

}

/* ================= MATCHING ================= */
function distance(a,b){
  return Math.abs(a.lat-b.lat)+Math.abs(a.lng-b.lng);
}

/* ================= CREAR VIAJE ================= */
async function createTrip(){

  if(role !== "client") return alert("Solo clientes");

  const dest = dest.value;

  const {data:drivers} = await sb
    .from("locations")
    .select("*")
    .eq("role","driver");

  if(!drivers.length) return alert("No drivers");

  const client = {lat:40.4168,lng:-3.7038};

  let best = drivers[0];

  drivers.forEach(d=>{
    if(distance(d,client) < distance(best,client)){
      best = d;
    }
  });

  await sb.from("trips").insert({
    client_id:user.id,
    driver_id:best.user_id,
    destination:dest,
    status:"pending"
  });

}

/* ================= VIAJES ================= */
function listenTrips(){

  sb.channel("trips")
  .on("postgres_changes",
    {event:"*",schema:"public",table:"trips"},
    payload=>renderTrips(payload.new)
  )
  .subscribe();

  loadTrips();
}

async function loadTrips(){

  const {data} = await sb.from("trips").select("*");

  data.forEach(renderTrips);
}

/* ================= UI VIAJES ================= */
function renderTrips(t){

  if(!t) return;

  let badge =
    t.status==="pending" ? "pending" :
    t.status==="accepted" ? "accepted" : "done";

  trips.innerHTML += `
    <div class="card">
      🚕 ${t.destination}<br>
      👤 ${t.client_id}<br>
      🚖 ${t.driver_id || "esperando"}<br>
      <span class="badge ${badge}">${t.status}</span><br>

      ${role==="driver" && t.status==="pending" ?
        `<button onclick="acceptTrip('${t.id}')">Aceptar</button>` : ""}
    </div>
  `;
}

/* ================= ACEPTAR VIAJE ================= */
async function acceptTrip(id){

  await sb.from("trips")
    .update({status:"accepted"})
    .eq("id",id);

}

/* ================= DRIVERS LIVE ================= */
function listenDrivers(){

  sb.channel("drivers")
  .on("postgres_changes",
    {event:"*",schema:"public",table:"locations"},
    loadDrivers
  )
  .subscribe();
}

async function loadDrivers(){

  const {data} = await sb
    .from("locations")
    .select("*")
    .eq("role","driver");

  data.forEach(d=>{
    L.marker([d.lat,d.lng])
      .addTo(map)
      .bindPopup("🚖 driver");
  });

}

</script>

</body>
</html>
