<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tazi · Taxi Madrid</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f1117;
  color:white;
  overflow:hidden;
}

#topbar{
  height:52px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 12px;
  background:#12141d;
  border-bottom:1px solid #2a2a45;
}

#map{
  height:58vh;
}

#panel{
  height:42vh;
  background:#161926;
  border-radius:22px 22px 0 0;
  padding:14px;
  overflow:auto;
}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#0f1117;
  color:white;
  margin-bottom:10px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#3ecf8e;
  font-weight:700;
  cursor:pointer;
}

.card{
  margin-top:10px;
  padding:10px;
  background:#1a1a2e;
  border-radius:10px;
}

.small{
  color:#9ca3af;
  font-size:.85rem;
}

.suggestions{
  background:#0f1117;
  border-radius:10px;
  max-height:120px;
  overflow:auto;
  margin-bottom:10px;
}

.suggestions div{
  padding:8px;
  border-bottom:1px solid #222;
  cursor:pointer;
}

.suggestions div:hover{
  background:#1a1a2e;
}
</style>
</head>

<body>

<div id="topbar">
  <strong>🚕 Taxi Madrid</strong>
  <button onclick="toggleFS()">⛶</button>
</div>

<div id="map"></div>

<div id="panel">

  <input id="dest" placeholder="Destino en Madrid..."
         oninput="searchSug(this.value)"/>

  <div id="sug" class="suggestions"></div>

  <button onclick="calcRoute()">Calcular trayecto</button>

  <div class="card">📏 Distancia: <span id="dist">--</span></div>
  <div class="card">⏱ Tiempo: <span id="time">--</span></div>
  <div class="card">
    🚕 Precio estimado: <span id="price">--</span>
    <div class="small">Tarifa Madrid + tráfico estimado + hora punta</div>
  </div>

</div>

<script>

/* ================= MAPA ================= */
const map = L.map("map").setView([40.4168,-3.7038], 12);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png")
.addTo(map);

let userMarker, routeLine;

/* ================= GPS ================= */
let user = null;

navigator.geolocation.watchPosition(pos=>{
  user = pos.coords;

  const p = [user.latitude,user.longitude];

  if(!userMarker){
    userMarker = L.marker(p).addTo(map)
      .bindPopup("📍 Posición actual");
  }else{
    userMarker.setLatLng(p);
  }
});

/* ================= TARIFA MADRID ================= */
const TAXI = {
  start: 2.55,
  km: 1.35,
  min: 0.30
};

const PEAK_EXTRA = 0.20;

function isPeakHour(){
  const h = new Date().getHours();
  return (h>=7&&h<=10)||(h>=17&&h<=20);
}

/* ================= AUTOCOMPLETE ================= */
let selected = null;

async function searchSug(q){

  if(q.length < 3){
    document.getElementById("sug").innerHTML="";
    return;
  }

  const res = await fetch(
    `https://nominatim.openstreetmap.org/search?format=json&q=${q}`
  );

  const data = await res.json();

  document.getElementById("sug").innerHTML =
    data.slice(0,5).map(x=>`
      <div onclick="setDest('${x.display_name}',${x.lat},${x.lon})">
        ${x.display_name}
      </div>
    `).join("");
}

function setDest(name,lat,lon){
  document.getElementById("dest").value = name;
  document.getElementById("sug").innerHTML="";
  selected = {lat:parseFloat(lat),lon:parseFloat(lon)};
}

/* ================= RUTA REAL (OSRM) ================= */
async function calcRoute(){

  if(!user || !selected)
    return alert("Falta GPS o destino");

  const url =
`https://router.project-osrm.org/route/v1/driving/`+
`${user.longitude},${user.latitude};${selected.lon},${selected.lat}?overview=full&geometries=geojson`;

  const res = await fetch(url);
  const data = await res.json();

  const route = data.routes[0];

  const km = route.distance / 1000;
  const min = route.duration / 60;

  document.getElementById("dist").innerText =
    km.toFixed(1)+" km";

  document.getElementById("time").innerText =
    Math.round(min)+" min";

  let price =
    TAXI.start +
    km*TAXI.km +
    min*TAXI.min;

  if(isPeakHour()){
    price += km * PEAK_EXTRA;
  }

  document.getElementById("price").innerText =
    price.toFixed(2)+" €";

  /* dibujar ruta */
  if(routeLine) map.removeLayer(routeLine);

  routeLine = L.geoJSON(route.geometry,{
    style:{
      color:"#3ecf8e",
      weight:5
    }
  }).addTo(map);

  map.fitBounds(routeLine.getBounds());
}

/* ================= FULLSCREEN ================= */
function toggleFS(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen();
  }else{
    document.exitFullscreen();
  }
}

</script>

</body>
</html>
